<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>直播间</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #17212b; color: #ffffff; text-align: center; }
    .header { padding: 10px; background: #242f3d; font-weight: bold; }
    .video-box { width: 100vw; height: 56.25vw; max-height: 80vh; background: #000; }
    .video-js { width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>

  <div class="header">🔴 正在直播中</div>

  <div class="video-box">
    <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay playsinline muted>
      <!-- 提示：以后有了自己的直播源地址，把下面这个 m3u8 链接替换掉即可 -->
      <source src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" type="application/x-mpegURL">
    </video>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    var player = videojs('live-player', { autoplay: 'any' });
  </script>
</body>
</html>
